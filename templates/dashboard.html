<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin: 0;
        }

        .header-actions {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-download {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-download:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-refresh {
            background: #f0f0f0;
            color: #333;
        }

        .btn-refresh:hover {
            background: #e0e0e0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .stat-card h3 {
            color: #999;
            font-size: 0.9em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-card.applied .value {
            color: #4CAF50;
        }

        .stat-card.failed .value {
            color: #ff6b6b;
        }

        .stat-card.companies .value {
            color: #ffa500;
        }

        .stat-card.locations .value {
            color: #17a2b8;
        }

        .charts-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .chart-container h2 {
            color: #333;
            font-size: 1.2em;
            margin-bottom: 20px;
            text-align: center;
        }

        .chart-wrapper {
            position: relative;
            height: 300px;
        }

        .table-section {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .table-section h2 {
            color: #333;
            font-size: 1.2em;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table thead {
            background: #f5f5f5;
        }

        table th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #ddd;
        }

        table td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        table tbody tr:hover {
            background: #f9f9f9;
        }

        table tbody tr.failed {
            background: #fff5f5;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status-applied {
            background: #d4edda;
            color: #155724;
        }

        .status-failed {
            background: #f8d7da;
            color: #721c24;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #721c24;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #155724;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 20px;
            }

            header h1 {
                font-size: 1.8em;
            }

            .header-actions {
                width: 100%;
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .charts-section {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 0.9em;
            }

            table th, table td {
                padding: 10px;
            }
        }

        .company-list {
            list-style: none;
        }

        .company-list li {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
        }

        .company-list li:last-child {
            border-bottom: none;
        }

        .company-count {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Job Application Dashboard</h1>
            <div class="header-actions">
                <button class="btn btn-refresh" onclick="loadDashboard()">🔄 Refresh</button>
                <a href="/download-csv" class="btn btn-download">📥 Download CSV</a>
            </div>
        </header>

        <div id="message-container"></div>

        <div class="stats-grid" id="stats-grid">
            <div class="stat-card loading">Loading statistics...</div>
        </div>

        <div class="charts-section" id="charts-section">
            <div class="chart-container">
                <h2>Top Companies Applied</h2>
                <div class="chart-wrapper">
                    <canvas id="companiesChart"></canvas>
                </div>
            </div>

            <div class="chart-container">
                <h2>Application Status Breakdown</h2>
                <div class="chart-wrapper">
                    <canvas id="statusChart"></canvas>
                </div>
            </div>
        </div>

        <div class="table-section" id="table-section" style="display: none;">
            <h2>📋 Recent Applications</h2>
            <table id="applicationsTable">
                <thead>
                    <tr>
                        <th>Job Role</th>
                        <th>Company</th>
                        <th>Location</th>
                        <th>Skills Required</th>
                        <th>Date Applied</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="applicationsBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let companiesChart = null;
        let statusChart = null;
        let appliedJobs = [];
        let failedJobs = [];

        async function loadDashboard() {
            try {
                await Promise.all([
                    loadStats(),
                    loadCompanyBreakdown(),
                    loadAppliedJobs()
                ]);
                showMessage('Dashboard updated successfully!', 'success');
            } catch (error) {
                showMessage('Error loading dashboard: ' + error.message, 'error');
            }
        }

        async function loadStats() {
            const response = await fetch('/dashboard-stats');
            const data = await response.json();

            const statsGrid = document.getElementById('stats-grid');
            statsGrid.innerHTML = `
                <div class="stat-card applied">
                    <h3>Applied</h3>
                    <div class="value">${data.total_applied}</div>
                </div>
                <div class="stat-card failed">
                    <h3>Failed/Skipped</h3>
                    <div class="value">${data.total_failed}</div>
                </div>
                <div class="stat-card companies">
                    <h3>Total Companies</h3>
                    <div class="value">${data.total_companies}</div>
                </div>
                <div class="stat-card">
                    <h3>Job Roles</h3>
                    <div class="value">${data.total_job_roles}</div>
                </div>
                <div class="stat-card locations">
                    <h3>Locations</h3>
                    <div class="value">${data.total_locations}</div>
                </div>
                <div class="stat-card">
                    <h3>Total Applications</h3>
                    <div class="value">${data.total_applications}</div>
                </div>
            `;

            // Update status chart
            updateStatusChart(data.total_applied, data.total_failed);
        }

        async function loadCompanyBreakdown() {
            const response = await fetch('/company-breakdown');
            const data = await response.json();

            const companies = data.companies || [];
            updateCompaniesChart(companies);
        }

        async function loadAppliedJobs() {
            try {
                const response = await fetch('/applied-jobs');
                appliedJobs = await response.json();

                if (appliedJobs.length > 0) {
                    updateJobsTable(appliedJobs.slice(0, 10));
                    document.getElementById('table-section').style.display = 'block';
                } else {
                    document.getElementById('table-section').style.display = 'none';
                }
            } catch (error) {
                console.log('Could not load jobs:', error);
            }
        }

        function updateJobsTable(jobs) {
            const tbody = document.getElementById('applicationsBody');
            tbody.innerHTML = jobs.map(job => `
                <tr>
                    <td>${job.Title || 'N/A'}</td>
                    <td>${job.Company || 'N/A'}</td>
                    <td>${job.Location || 'N/A'}</td>
                    <td><small>${(job.Skills_required || 'N/A').substring(0, 50)}...</small></td>
                    <td>${job.Date_Applied || 'N/A'}</td>
                    <td><span class="status-badge status-applied">Applied</span></td>
                </tr>
            `).join('');
        }

        function updateCompaniesChart(companies) {
            const ctx = document.getElementById('companiesChart').getContext('2d');

            if (companiesChart) {
                companiesChart.destroy();
            }

            companiesChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: companies.map(c => c.name.substring(0, 20)),
                    datasets: [{
                        label: 'Applications',
                        data: companies.map(c => c.count),
                        backgroundColor: [
                            '#667eea',
                            '#764ba2',
                            '#f093fb',
                            '#4facfe',
                            '#00f2fe',
                            '#43e97b',
                            '#fa709a',
                            '#fee140',
                            '#30b0fe',
                            '#ec008c'
                        ],
                        borderRadius: 5,
                        borderSkipped: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                stepSize: 1
                            }
                        }
                    }
                }
            });
        }

        function updateStatusChart(applied, failed) {
            const ctx = document.getElementById('statusChart').getContext('2d');

            if (statusChart) {
                statusChart.destroy();
            }

            statusChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Applied', 'Failed/Skipped'],
                    datasets: [{
                        data: [applied, failed],
                        backgroundColor: [
                            '#4CAF50',
                            '#ff6b6b'
                        ],
                        borderColor: [
                            '#45a049',
                            '#e74c3c'
                        ],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }

        function showMessage(message, type) {
            const container = document.getElementById('message-container');
            const messageClass = type === 'success' ? 'success-message' : 'error-message';
            container.innerHTML = `<div class="${messageClass}">${message}</div>`;

            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        // Load dashboard on page load
        window.addEventListener('load', loadDashboard);

        // Auto-refresh every 30 seconds
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
